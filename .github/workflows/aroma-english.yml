name: Aroma English check

# Runs on every push/PR to main (fast JSON scan). Manual runs: Actions → Aroma English check → Run workflow.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  user-facing-english:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify aroma user-facing strings (no German / umlaut leaks)
        run: python3 scripts/check_aroma_english.py
