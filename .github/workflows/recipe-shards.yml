name: Recipe shards

on:
  push:
    branches: [main]
    paths:
      - "claude_index/**"
      - "recipe_detail/**"
      - "scripts/**"
      - "index.html"
      - ".github/workflows/recipe-shards.yml"
  pull_request:
    branches: [main]
    paths:
      - "claude_index/**"
      - "recipe_detail/**"
      - "scripts/**"
      - "index.html"
      - ".github/workflows/recipe-shards.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify index + detail alignment
        run: python3 scripts/check-recipe-shards.py
