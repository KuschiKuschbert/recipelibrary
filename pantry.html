<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c0c0c">
<title>Pantry → recipes · Kuschi Kitchen</title>
<link rel="stylesheet" href="assets/theme.css">
<link rel="preload" href="pantry_data/shard_hay_index.json" as="fetch" type="application/json" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 8px; }
  p.lead { color: var(--text2); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
  textarea {
    width: 100%; min-height: 88px; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text); font: inherit; resize: vertical; box-sizing: border-box;
  }
  button.primary {
    margin-top: 12px; padding: 12px 22px; border-radius: 100px; border: 1px solid var(--gold);
    background: var(--gold-dim); color: var(--gold); font-weight: 600; cursor: pointer; font: inherit;
  }
  .nav { margin-bottom: 24px; font-size: 13px; }
  .nav a { color: var(--gold); text-decoration: none; }
  #out { margin-top: 24px; }
  .pantry-card {
    border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px;
    background: var(--surface); cursor: pointer;
  }
  .pantry-card:hover { border-color: var(--gold); }
  .pantry-name { font-weight: 600; font-size: 16px; }
  .pantry-meta { font-size: 12px; color: var(--text3); margin-top: 6px; }
  .status { font-size: 13px; color: var(--text3); margin-top: 8px; }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="wrap">
  <div class="nav"><a href="index.html">← Kitchen Library</a> · <a href="flavor.html">Flavor</a> · <a href="pairing-atlas.html">Matrix</a> · <a href="notebooklm-gallery.html">Guides</a></div>
  <h1>Pantry search</h1>
  <p class="lead">Enter ingredients you have (comma or newline separated). We match against the library index <code>ing</code> fields — no guarantee of overlap with pantry items.</p>
  <textarea id="pantryIn" placeholder="e.g. chicken, lemon, garlic, olive oil"></textarea>
  <button type="button" class="primary" id="pantryGo" disabled>Find recipes</button>
  <p class="status" id="pantryStatus">Loading pantry index…</p>
  <div id="out"></div>
</div>
<script>
(function () {
  var SHARDS = [];
  var HAY_INDEX_URL = 'pantry_data/shard_hay_index.json';

  function siteBaseUrl() {
    var origin = window.location.origin;
    var p = window.location.pathname;
    if (/\.html?$/i.test(p)) {
      var dir = p.slice(0, p.lastIndexOf('/'));
      return dir ? origin + dir : origin;
    }
    var stripped = p.replace(/\/$/, '') || '';
    return stripped ? origin + stripped : origin;
  }

  function norm(s) {
    return String(s || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
  }
  function tokens(s) {
    return norm(s).split(' ').filter(function (w) { return w.length > 2; });
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  var hayIndex = null;
  var hayIndexFailed = false;
  var shardRecipeCache = Object.create(null);

  function loadCatalogManifest() {
    if (SHARDS.length) return Promise.resolve(SHARDS);
    var base = siteBaseUrl();
    return fetch(base + '/alpha_catalog/manifest.json')
      .then(function (r) {
        if (!r.ok) throw new Error('manifest');
        return r.json();
      })
      .then(function (data) {
        SHARDS = (data && data.files) || [];
        return SHARDS;
      });
  }

  function loadHayIndex() {
    if (hayIndexFailed) return Promise.resolve(null);
    if (hayIndex) return Promise.resolve(hayIndex);
    var url = siteBaseUrl() + '/' + HAY_INDEX_URL.replace(/^\/+/, '');
    return fetch(url)
      .then(function (r) {
        if (!r.ok) throw new Error('hay index');
        return r.json();
      })
      .then(function (data) {
        if (data && data.shards && typeof data.shards === 'object') {
          hayIndex = data.shards;
        } else {
          hayIndex = null;
        }
        return hayIndex;
      })
      .catch(function () {
        hayIndexFailed = true;
        hayIndex = null;
        return null;
      });
  }

  /** Shards that might contain any user token (substring), else all shards. */
  function pickShards(needToks) {
    if (!hayIndex || !needToks.length) return SHARDS.slice();
    var picked = [];
    for (var s = 0; s < SHARDS.length; s++) {
      var fn = SHARDS[s];
      var hay = hayIndex[fn];
      if (!hay) continue;
      var hit = false;
      for (var t = 0; t < needToks.length; t++) {
        var tok = needToks[t];
        if (tok && hay.indexOf(tok) >= 0) {
          hit = true;
          break;
        }
      }
      if (hit) picked.push(fn);
    }
    return picked.length ? picked : SHARDS.slice();
  }

  var PANTRY_FETCH_CONCURRENCY = 10;

  /** Same pattern as index.html — bounded parallelism for alpha_catalog fetches. */
  function mapWithConcurrency(items, limit, mapper) {
    var ret = new Array(items.length);
    var next = 0;
    function worker() {
      return new Promise(function (resolve) {
        function step() {
          var i = next++;
          if (i >= items.length) {
            resolve();
            return;
          }
          Promise.resolve(mapper(items[i], i))
            .then(function (v) {
              ret[i] = v;
              step();
            })
            .catch(function () {
              ret[i] = [];
              step();
            });
        }
        step();
      });
    }
    var n = items.length ? Math.min(limit, items.length) : 0;
    if (!n) return Promise.resolve(ret);
    var workers = [];
    for (var w = 0; w < n; w++) workers.push(worker());
    return Promise.all(workers).then(function () { return ret; });
  }

  function fetchShardRecipes(files) {
    var base = siteBaseUrl();
    return mapWithConcurrency(files, PANTRY_FETCH_CONCURRENCY, function (f) {
      if (shardRecipeCache[f]) return Promise.resolve(shardRecipeCache[f]);
      return fetch(base + '/alpha_catalog/' + encodeURIComponent(f))
        .then(function (r) {
          return r.ok ? r.json() : { recipes: [] };
        })
        .then(function (p) {
          var rec = (p && p.recipes) || [];
          shardRecipeCache[f] = rec;
          return rec;
        });
    }).then(function (parts) {
      var all = [];
      for (var i = 0; i < parts.length; i++) {
        all = all.concat(parts[i]);
      }
      return all;
    });
  }

  function loadRecipesForPantrySearch(needToks) {
    return loadHayIndex().then(function () {
      var files = pickShards(needToks);
      return fetchShardRecipes(files).then(function (all) {
        return { all: all, shardCount: files.length };
      });
    });
  }

  function scoreRecipe(r, needToks) {
    var ing = (r.ing || []).join(' ').toLowerCase();
    var name = (r.name || '').toLowerCase();
    var hay = ing + ' ' + name;
    var hit = 0;
    for (var i = 0; i < needToks.length; i++) {
      if (hay.indexOf(needToks[i]) >= 0) hit++;
    }
    return hit;
  }

  document.getElementById('pantryGo').addEventListener('click', function () {
    var raw = document.getElementById('pantryIn').value;
    var parts = raw.split(/[\n,]+/).map(function (s) { return s.trim(); }).filter(Boolean);
    var needToks = [];
    parts.forEach(function (p) {
      tokens(p).forEach(function (t) {
        if (needToks.indexOf(t) < 0) needToks.push(t);
      });
    });
    var st = document.getElementById('pantryStatus');
    var out = document.getElementById('out');
    out.innerHTML = '';
    if (!needToks.length) {
      st.textContent = 'Add at least one ingredient.';
      return;
    }
    st.textContent = 'Searching library…';
    loadRecipesForPantrySearch(needToks)
      .then(function (pack) {
        var all = pack.all;
        var scored = [];
        for (var i = 0; i < all.length; i++) {
          var sc = scoreRecipe(all[i], needToks);
          if (sc > 0) scored.push({ r: all[i], sc: sc });
        }
        scored.sort(function (a, b) { return b.sc - a.sc || (a.r.name || '').localeCompare(b.r.name || ''); });
        var seg = pack.shardCount < SHARDS.length ? ' (scanned ' + pack.shardCount + ' of ' + SHARDS.length + ' index parts)' : '';
        st.textContent = scored.length + ' recipes match at least one token (' + needToks.join(', ') + ').' + seg;
        out.innerHTML = scored.slice(0, 40).map(function (x) {
          return '<div class="pantry-card" data-open-id="' + esc(x.r.id) + '">' +
            '<div class="pantry-name">' + esc(x.r.name || '') + '</div>' +
            '<div class="pantry-meta">Match score ' + x.sc + ' · ' + esc(x.r.cui || '') + '</div></div>';
        }).join('');
        out.querySelectorAll('.pantry-card').forEach(function (el) {
          el.addEventListener('click', function () {
            var id = el.getAttribute('data-open-id');
            if (id) location.href = 'index.html?open=' + encodeURIComponent(id);
          });
        });
        if (!scored.length) out.innerHTML = '<p class="status">No matches. Try broader names (e.g. “onion” not “yellow onion”).</p>';
      })
      .catch(function () {
        st.textContent = 'Failed to load index.';
      });
  });

  Promise.all([loadCatalogManifest(), loadHayIndex()])
    .then(function () {
      var go = document.getElementById('pantryGo');
      var st = document.getElementById('pantryStatus');
      if (go) go.disabled = false;
      if (st && st.textContent.indexOf('Loading pantry index') === 0) {
        if (!SHARDS.length) {
          st.textContent = 'Could not load alpha_catalog/manifest.json.';
        } else {
          st.textContent = hayIndex
            ? 'Ready — add ingredients and tap Find recipes. (Only matching index parts load per search.)'
            : 'Ready — add ingredients and tap Find recipes. (Full index load per search — routing file missing.)';
        }
      }
    })
    .catch(function () {
      var st = document.getElementById('pantryStatus');
      var go = document.getElementById('pantryGo');
      if (st) st.textContent = 'Failed to load catalog manifest.';
      if (go) go.disabled = true;
    });
})();
</script>
</body>
</html>
